name: Build Android APK

on:
workflow_dispatch:
push:
branches: [ "main" ]

jobs:
build-apk:
runs-on: ubuntu-latest

steps:
- name: Checkout
uses: actions/checkout@v4

- name: Setup Java 17
uses: actions/setup-java@v4
with:
distribution: temurin
java-version: '17'

- name: Setup Flutter
uses: subosito/flutter-action@v2
with:
flutter-version: '3.24.3'
channel: 'stable'

- name: Create Android folder if missing
run: |
if [ ! -d "android" ]; then
flutter create .
fi

- name: Flutter pub get
run: flutter pub get

- name: Ensure Android permissions
